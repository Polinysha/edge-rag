version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      - qdrant

  ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: streamlit run src/ui/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api

volumes:
  qdrant_data: